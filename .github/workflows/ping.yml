name: Record ping

# A monitor "pings" by sending a repository_dispatch event of type "ping":
#
#   curl -X POST https://api.github.com/repos/Asbak-Labs/Asbak-Labs.github.io/dispatches \
#     -H "Accept: application/vnd.github+json" \
#     -H "Authorization: token <PING_TOKEN>" \
#     -d '{"event_type":"ping","client_payload":{"monitor":"my-server"}}'
#
# Optional client_payload fields: "name" (display name), "status" ("up"|"down").

on:
  repository_dispatch:
    types: [ping]

permissions:
  contents: write

# Serialise pings per-monitor so two pings from the SAME monitor don't race,
# while pings from different monitors still run in parallel.
concurrency:
  group: ping-${{ github.event.client_payload.monitor }}
  cancel-in-progress: false

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Record the heartbeat AND re-evaluate all monitors. Pings arrive far more
      # reliably than GitHub's cron (which is best-effort and often hours late),
      # so this keeps status.json fresh; the scheduled check.yml remains only as
      # a fallback for when no monitor is pinging at all.
      #
      # Concurrent pings from different monitors edit the same files
      # (status.json, history/), so on a push race the scripts are re-run from a
      # clean checkout of the remote head instead of rebasing local commits.
      - name: Record heartbeat and update status
        env:
          MONITOR: ${{ github.event.client_payload.monitor }}
          NAME: ${{ github.event.client_payload.name }}
          STATUS: ${{ github.event.client_payload.status }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          git config user.name "status-bot"
          git config user.email "status-bot@users.noreply.github.com"
          for i in 1 2 3 4 5; do
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
            node scripts/record-ping.mjs
            node scripts/check.mjs
            git add data/
            git commit -m "ping: ${MONITOR}" || { echo "nothing to commit"; exit 0; }
            git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            echo "push race, retrying ($i)..."
            sleep $((RANDOM % 5 + 1))
          done
          echo "Failed to push after retries" >&2
          exit 1
