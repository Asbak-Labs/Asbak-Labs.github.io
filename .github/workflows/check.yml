name: Status check

# FALLBACK ONLY. The status is normally refreshed by ping.yml on every
# incoming heartbeat, since GitHub cron is best-effort and in practice fires
# hours apart. This schedule matters only when NO monitor is pinging (so it is
# what eventually flips everything to "down") — hence a "down" alert for the
# last remaining monitor can still lag by however late the cron fires.
on:
  schedule:
    # Nominally every 10 minutes; GitHub delays or drops runs under load.
    - cron: '*/10 * * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'monitors.json'
      - 'scripts/check.mjs'

permissions:
  contents: write

concurrency:
  group: status-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Evaluate monitors
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node scripts/check.mjs

      - name: Commit status
        run: |
          git config user.name "status-bot"
          git config user.email "status-bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No status changes."
            exit 0
          fi
          git commit -m "status: update $(date -u +%H:%MZ)"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push && exit 0
            echo "push race, retrying ($i)..."
            sleep $((RANDOM % 5 + 1))
          done
          echo "Failed to push after retries" >&2
          exit 1
