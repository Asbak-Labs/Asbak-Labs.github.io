name: Deploy Pages

# Deploy ONLY when the page itself or the rendered status changes.
# Heartbeat pings (data/heartbeats/**) deliberately do NOT trigger a deploy,
# which prevents a rebuild storm when many monitors ping.
on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/**'
      - 'data/status.json'
      - '.nojekyll'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer commit supersedes an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
